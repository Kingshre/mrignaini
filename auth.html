<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { DEFAULT: '#1a4a3a', deep: '#0e2e24', light: '#2d6a4f' },
            maroon: { DEFAULT: '#A82039', dark: '#5C1A33' },
            gold: { DEFAULT: '#C6A56B', light: '#EADFCF', dark: '#B8945A' },
            ivory: '#F5F0E8',
            cream: '#FDF8F0',
            mustard: '#B8945A',
          },
          fontFamily: {
            heading: ['Cormorant Garamond', 'serif'],
            body: ['Outfit', 'sans-serif'],
            accent: ['Caveat', 'cursive'],
          }
        }
      }
    }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shop.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--clr-cream);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: linear-gradient(135deg, transparent 40%, rgba(198,165,107,0.06) 40%, rgba(198,165,107,0.06) 41%, transparent 41%);
            pointer-events: none;
            z-index: 0;
        }
        .auth-box {
            position: relative;
            z-index: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(10,31,24,0.06);
            max-width: 440px;
            width: 100%;
            padding: 48px 40px;
            border: 1px solid rgba(198,165,107,0.25);
            text-align: center;
        }
        .auth-logo {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            color: var(--clr-forest);
            letter-spacing: 0.15em;
            margin-bottom: 4px;
        }
        .auth-subtitle {
            font-family: var(--font-body);
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 36px;
        }
        .auth-form {
            text-align: left;
        }
        .auth-form .form-group {
            margin-bottom: 24px;
        }
        .auth-form label {
            display: block;
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--clr-forest);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(200,169,110,0.3);
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--clr-forest-deep);
            transition: all 0.3s ease;
            background: var(--clr-cream);
        }
        .auth-form input::placeholder {
            color: rgba(26,74,58,0.4);
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--clr-forest-light);
            background: white;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
        }
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--clr-forest), var(--clr-forest-light));
            color: var(--clr-ivory);
            font-family: var(--font-body);
            border: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 74, 58, 0.25);
        }
        .auth-msg {
            color: var(--clr-maroon);
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }
        .auth-toggle {
            margin-top: 28px;
            font-size: 0.95rem;
            color: #666;
        }
        .auth-toggle a {
            color: var(--clr-mustard);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: underline;
        }
        .auth-toggle a:hover {
            color: var(--clr-forest);
        }
    </style>
</head>
<body>

    <!-- ========== NAVIGATION ========== -->
    <nav id="navbar" class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <span class="brand-name">mrignaini</span>
            </a>
            <div class="nav-links" id="navLinks">
                <div class="nav-dropdown">
                    <a href="category.html?cat=tops" class="nav-link nav-link-dropdown">Shop <svg viewBox="0 0 12 8" width="10" height="8"><path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></a>
                    <div class="dropdown-menu">
                        <a href="category.html?cat=tops" class="dropdown-item">Tops</a>
                        <a href="category.html?cat=dresses" class="dropdown-item">Dresses</a>
                        <a href="category.html?cat=sets" class="dropdown-item">Sets</a>
                        <a href="category.html?cat=layers" class="dropdown-item">Layers</a>
                    </div>
                </div>
                <a href="index.html#story" class="nav-link">Our Story</a>
                <a href="index.html#craft" class="nav-link">The Craft</a>
            </div>
            <div class="nav-right">
                <div class="auth-ui" id="authUiContainer"></div>
                <a href="cart.html" class="nav-cart" aria-label="Shopping cart">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.5"/><path d="M16 10a4 4 0 01-8 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="cart-badge">0</span>
                </a>
                <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ========== AUTHENTICATION ========== -->
    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">mrignaini</div>
            <div class="auth-subtitle" id="authSubtitle">Welcome back to our heritage</div>
            
            <form class="auth-form" id="authForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="authName">Full Name</label>
                    <input type="text" id="authName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="authEmail">Email Address</label>
                    <input type="email" id="authEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required>
                </div>
                <div id="authMsg" class="auth-msg"></div>
                <button type="submit" class="auth-btn" id="authSubmitBtn">Log In</button>
            </form>

            <div class="auth-toggle">
                <span id="authToggleText">Don't have an account?</span> 
                <a onclick="toggleAuthMode()" id="authToggleBtn">Sign up</a>
            </div>
        </div>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('nameGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'Log In' : 'Create Account';
            document.getElementById('authSubtitle').innerText = isLoginMode ? 'Welcome back to our heritage' : 'Join our vibrant community';
            document.getElementById('authToggleText').innerText = isLoginMode ? 'Don\'t have an account?' : 'Already have an account?';
            document.getElementById('authToggleBtn').innerText = isLoginMode ? 'Sign up' : 'Log in';
            document.getElementById('authMsg').innerText = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const name = document.getElementById('authName').value;
            const msgEl = document.getElementById('authMsg');
            const submitBtn = document.getElementById('authSubmitBtn');
            
            msgEl.innerText = '';
            msgEl.style.color = '#A82039'; // maroon
            submitBtn.disabled = true;
            submitBtn.innerText = 'Please wait...';

            try {
                if (isLoginMode) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email, 
                        password,
                        options: { data: { full_name: name } }
                    });
                    if (error) throw error;
                    msgEl.style.color = '#2d6a4f'; // green success
                    msgEl.innerText = 'Account created successfully! Please log in.';
                    setTimeout(toggleAuthMode, 1500);
                }
            } catch (err) {
                msgEl.innerText = err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLoginMode ? 'Log In' : 'Create Account';
            }
        });

        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof supabaseClient !== 'undefined') {
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) window.location.href = 'index.html';
                } catch (e) {
                    // ignore
                }
            }
        });
    </script>
</body>
</html>
